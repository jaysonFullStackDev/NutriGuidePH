<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriPH - Sign Up</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --green-accent: #78bc27;
            --green-hover: #5e9a1d;
            --green-dark: #2d6a07;
            --radius: 12px;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, rgba(45,90,14,0.88), rgba(61,107,15,0.78)),
                        url('../images/happy.jpg') center/cover no-repeat fixed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 1rem;
        }
        .auth-card {
            border-top: 5px solid var(--green-accent);
            max-width: 520px;
            width: 100%;
            border-radius: 16px;
        }
        .auth-card .card-body { padding: 2rem; }
        .auth-card img { height: 56px; }
        .auth-card h5 { font-size: 1.1rem; letter-spacing: 0.5px; }
        .btn-green {
            background-color: var(--green-accent);
            border: none;
            color: #fff;
            font-weight: 700;
            border-radius: var(--radius);
            transition: all 0.25s ease;
        }
        .btn-green:hover {
            background-color: var(--green-hover);
            color: #fff;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(120,188,39,0.3);
        }
        .form-control, .form-select {
            border-radius: 8px;
            font-size: 0.9rem;
            padding: 0.55rem 0.85rem;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--green-accent);
            box-shadow: 0 0 0 0.2rem rgba(120,188,39,0.12);
        }
        .input-group-text { border-radius: 8px 0 0 8px; font-size: 0.85rem; }
        .toggle-pass {
            cursor: pointer;
            color: var(--green-accent);
            font-size: 0.8rem;
            font-weight: 700;
            user-select: none;
            border-radius: 0 8px 8px 0;
        }
        .section-divider {
            font-size: 0.72rem;
            font-weight: 700;
            color: var(--green-dark);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 2px solid #dde8c8;
            padding-bottom: 6px;
        }
        .link-green { color: var(--green-accent); font-weight: 700; text-decoration: none; }
        .link-green:hover { text-decoration: underline; color: var(--green-hover); }
        .form-label { font-size: 0.82rem; }

        @media (min-width: 576px) {
            .auth-card .card-body { padding: 2.5rem; }
            .auth-card img { height: 64px; }
        }
        @media (max-width: 400px) {
            .auth-card .card-body { padding: 1.5rem; }
            .auth-card img { height: 48px; }
            .auth-card h5 { font-size: 1rem; }
            .row.g-3 > [class*="col-sm-6"] { flex: 0 0 100%; max-width: 100%; }
        }
    </style>
</head>
<body>
    <div class="card auth-card shadow-lg border-0">
        <div class="card-body">
            <div class="text-center mb-4">
                <img src="../images/logo.png" alt="NutriPH Logo" class="mb-3">
                <h5 class="fw-bold text-success">NUTRIPH SIGN UP</h5>
            </div>

            <div class="alert alert-danger small py-2 d-none" id="errorMsg" role="alert">
                <i class="fa-solid fa-circle-exclamation me-1"></i><span id="errorText"></span>
            </div>

            <form action="../php/connect.php" method="post">
                <p class="section-divider mb-3">Personal Information</p>

                <div class="row g-3 mb-3">
                    <div class="col-sm-6">
                        <label for="firstName" class="form-label fw-semibold text-muted">First Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" class="form-control" id="firstName" name="firstName" placeholder="First name" required>
                        </div>
                    </div>
                    <div class="col-sm-6">
                        <label for="lastName" class="form-label fw-semibold text-muted">Last Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light"><i class="fa-solid fa-user text-muted"></i></span>
                            <input type="text" class="form-control" id="lastName" name="lastName" placeholder="Last name" required>
                        </div>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="role" class="form-label fw-semibold text-muted">Account Role</label>
                    <select class="form-select" id="role" name="role">
                        <option value="Employee">Employee</option>
                        <option value="Admin">Admin</option>
                        <option value="Super Admin">Super Admin</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="Email" class="form-label fw-semibold text-muted">Email</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fa-solid fa-envelope text-muted"></i></span>
                        <input type="email" class="form-control" id="Email" name="Email" placeholder="Enter your email" required>
                    </div>
                </div>

                <p class="section-divider mb-3 mt-4">Security</p>

                <div class="mb-3">
                    <label for="password" class="form-label fw-semibold text-muted">Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Create a password" required>
                        <span class="input-group-text bg-light toggle-pass" onclick="togglePassword('password','eyeIcon1')">
                            <i class="fa-solid fa-eye" id="eyeIcon1"></i>
                        </span>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="password1" class="form-label fw-semibold text-muted">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fa-solid fa-lock text-muted"></i></span>
                        <input type="password" class="form-control" id="password1" name="confirm_password" placeholder="Confirm your password" required>
                        <span class="input-group-text bg-light toggle-pass" onclick="togglePassword('password1','eyeIcon2')">
                            <i class="fa-solid fa-eye" id="eyeIcon2"></i>
                        </span>
                    </div>
                </div>

                <button type="submit" class="btn btn-green w-100 py-2 mb-3">
                    <i class="fa-solid fa-user-plus me-2"></i>Create Account
                </button>
            </form>

            <p class="text-center text-muted small mb-2">
                Already have an account? <a href="signin.html" class="link-green">Sign In</a>
            </p>
            <p class="text-center text-muted small mb-0">
                Are you a parent? <a href="parent_signup.html" class="link-green">Sign Up as Parent/Guardian</a>
            </p>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const error = params.get('error');

        const errorMessages = {
            password_mismatch: 'Passwords do not match. Please try again.',
            email_exists: 'An account with that email already exists.',
            empty_fields: 'Please fill in all required fields.',
            db_error: 'Database error. Please try again later.'
        };

        if (error && errorMessages[error]) {
            document.getElementById('errorText').textContent = errorMessages[error];
            document.getElementById('errorMsg').classList.remove('d-none');
        }

        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                input.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
